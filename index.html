<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DisparoFive - Produção</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Importação de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@400;700;900&family=Poppins:wght@400;700;900&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* Classes personalizadas para as fontes */
        .font-inter { font-family: 'Inter', sans-serif; }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        .font-roboto { font-family: 'Roboto', sans-serif; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }

</head>
<body class="bg-gradient-to-br from-slate-100 via-white to-slate-100 min-h-screen flex flex-col items-center p-3 md:p-6 font-sans transition-all duration-500">

    <!-- CABEÇALHO (Compactado) -->
    <header class="w-full max-w-[1600px] flex justify-between items-center mb-4 bg-white p-3 rounded-xl shadow-sm border border-slate-200/60">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center text-white shadow-md shadow-green-200">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <div>
                <h1 class="text-sm font-black text-slate-800 leading-none">DisparoFive</h1>
                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Painel de Controlo • 12 Blocos</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div class="flex items-center gap-1.5 bg-slate-50 px-2.5 py-1 rounded-full border border-slate-100">
                <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-yellow-400 animate-pulse"></div>
                <span id="status-global" class="text-[8px] font-black text-slate-500 uppercase tracking-widest">A ligar...</span>
            </div>
            <!-- Botão de Configurações -->
            <button onclick="toggleSettings()" class="p-1.5 bg-slate-50 text-slate-400 hover:text-slate-600 hover:bg-slate-100 border border-slate-100 rounded-full transition-colors" title="Configurações">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>
        </div>
    </header>

    <!-- PAINEL DE CONFIGURAÇÕES -->
    <section id="settings-panel" class="hidden w-full max-w-[1600px] mb-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200/60 transition-all">
        <div class="flex justify-between items-center mb-3">
            <h2 class="text-[9px] font-black text-slate-400 uppercase tracking-widest block">Configurações de Aparência</h2>
            <button onclick="toggleSettings()" class="text-slate-400 hover:text-slate-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3 bg-slate-50 p-3 rounded-lg border border-slate-100">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1.5">Fonte do App:</label>
                <select id="font-selector" onchange="changeFont(this.value)" class="w-full p-1.5 bg-white border border-slate-200 rounded text-xs text-slate-700 outline-none focus:ring-2 focus:ring-green-400 cursor-pointer">
                    <option value="font-sans">Padrão do Sistema</option>
                    <option value="font-poppins">Poppins (Moderna)</option>
                    <option value="font-inter">Inter (Profissional)</option>
                    <option value="font-montserrat">Montserrat (Elegante)</option>
                    <option value="font-roboto">Roboto (Clássica)</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1.5">Tema de Fundo:</label>
                <select id="theme-selector" onchange="changeTheme(this.value)" class="w-full p-1.5 bg-white border border-slate-200 rounded text-xs text-slate-700 outline-none focus:ring-2 focus:ring-green-400 cursor-pointer">
                    <option value="bg-gradient-to-br from-slate-100 via-white to-slate-100">Claro Perolado</option>
                    <option value="bg-gradient-to-br from-amber-900 to-blue-950">Escuro (Marrom e Marinho)</option>
                    <option value="bg-gradient-to-br from-amber-900 via-stone-800 to-stone-900">Café Expresso</option>
                    <option value="bg-gradient-to-br from-blue-600 to-indigo-800">Azul Caneta</option>
                    <option value="bg-gradient-to-br from-green-500 to-green-800">Verde Bandeira</option>
                    <option value="bg-gradient-to-br from-slate-800 via-indigo-900 to-slate-900">Noturno Perolado</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1.5">Fonte dos Botões:</label>
                <select id="btn-font-selector" onchange="changeBtnFont(this.value)" class="w-full p-1.5 bg-white border border-slate-200 rounded text-xs text-slate-700 outline-none focus:ring-2 focus:ring-green-400 cursor-pointer">
                    <option value="font-sans">Padrão do Sistema</option>
                    <option value="font-poppins">Poppins (Moderna)</option>
                    <option value="font-inter">Inter (Profissional)</option>
                    <option value="font-montserrat">Montserrat (Elegante)</option>
                    <option value="font-roboto">Roboto (Clássica)</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1.5">Estilo dos Botões:</label>
                <select id="btn-shape-selector" onchange="changeBtnShape(this.value)" class="w-full p-1.5 bg-white border border-slate-200 rounded text-xs text-slate-700 outline-none focus:ring-2 focus:ring-green-400 cursor-pointer">
                    <option value="rounded-lg">Arredondado (Padrão)</option>
                    <option value="rounded-full">Pílula</option>
                    <option value="rounded-sm">Quadrado</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1.5">Tam. da Fonte dos Botões:</label>
                <select id="btn-size-selector" onchange="changeBtnTextSize(this.value)" class="w-full p-1.5 bg-white border border-slate-200 rounded text-xs text-slate-700 outline-none focus:ring-2 focus:ring-green-400 cursor-pointer">
                    <option value="text-[10px]">10px (Padrão)</option>
                    <option value="text-xs">12px (Médio)</option>
                    <option value="text-sm">14px (Grande)</option>
                    <option value="text-base">16px (Extra Grande)</option>
                    <option value="text-lg">18px (Gigante)</option>
                </select>
            </div>
        </div>
    </section>

    <!-- GERADOR RÁPIDO DE LINK (Compactado) -->
    <section class="w-full max-w-[1600px] mb-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200/60 flex flex-col md:flex-row gap-3 items-end">
        <div class="w-full md:w-1/3">
            <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest block mb-1.5 flex items-center justify-between">
                <span>Gerador Rápido</span>
                <span class="text-[7px] bg-sky-100 text-sky-600 px-1.5 py-0.5 rounded-full flex items-center gap-1">
                    <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Lê Prints!
                </span>
            </label>
            <input type="text" id="quick-number" class="w-full p-2 bg-slate-50 border border-gray-100 rounded-lg font-mono text-xs sm:text-sm focus:ring-2 focus:ring-green-400 outline-none text-slate-700 transition-all placeholder:text-slate-300" placeholder="Digite ou Cole Print (Ctrl+V)">
        </div>
        <div class="w-full md:w-2/3 flex flex-wrap sm:flex-nowrap gap-2">
            <input type="text" id="quick-link" class="flex-1 w-full sm:w-auto p-2 bg-slate-50 border border-gray-100 rounded-lg font-mono text-xs text-slate-400 outline-none cursor-not-allowed" readonly placeholder="https://wa.me/55...">
            <button id="btn-quick-whatsapp" onclick="openQuickWhatsApp()" class="bg-[#25D366] hover:bg-[#128C7E] text-white font-black px-3 py-2 rounded-lg shadow-sm transition-all active:scale-95 uppercase text-[9px] tracking-widest whitespace-nowrap flex-1 sm:flex-none leading-none">
                WhatsApp
            </button>
            <button id="btn-quick-copy" onclick="copyQuickLink()" class="bg-sky-500 hover:bg-sky-600 text-white font-black px-3 py-2 rounded-lg shadow-sm transition-all active:scale-95 uppercase text-[9px] tracking-widest whitespace-nowrap flex-1 sm:flex-none leading-none">
                Copiar
            </button>
        </div>
    </section>

    <!-- GRID PRINCIPAL (12 BLOCOS EM 3 COLUNAS - Compactado) -->
    <main id="bricks-container" class="w-full max-w-[1600px] grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Tijolos dinâmicos renderizados via JS -->
    </main>

    <footer class="mt-6 pb-6 text-center opacity-40">
        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Produção • Vercel + Firebase</p>
    </footer>

    <!-- Firebase SDKs e Lógica -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ========================================================
        // 1. CONFIG DO FIREBASE
        // ========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDxZcyaKlxkSSptdRTN8HRyO3P58wbd0jk",
            authDomain: "disparofire-cfbfb.firebaseapp.com",
            projectId: "disparofire-cfbfb",
            storageBucket: "disparofire-cfbfb.firebasestorage.app",
            messagingSenderId: "194928300801",
            appId: "1:194928300801:web:906db6180611ab71364100"
        };
        // ========================================================

        const appIdentifier = 'disparofive-prod';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let isFirstLoad = true; 
        
        // Estado Global da Aplicação
        window.appFont = 'font-sans';
        window.btnFont = 'font-sans';
        window.btnShape = 'rounded-lg';
        window.btnTextSize = 'text-[10px]';
        window.appTheme = 'bg-gradient-to-br from-slate-100 via-white to-slate-100'; // Default theme

        const ALL_THEMES = [
            'bg-gradient-to-br from-slate-100 via-white to-slate-100',
            'bg-gradient-to-br from-amber-900 to-blue-950',
            'bg-gradient-to-br from-amber-900 via-stone-800 to-stone-900',
            'bg-gradient-to-br from-blue-600 to-indigo-800',
            'bg-gradient-to-br from-green-500 to-green-800',
            'bg-gradient-to-br from-slate-800 via-indigo-900 to-slate-900'
        ];

        // Geração dos 12 Modelos Disponíveis
        window.templates = {};
        for(let i = 1; i <= 12; i++) {
            window.templates[i] = { title: `Modelo ${i}`, msg: "", num: "", ddd: "33" };
        }

        const statusText = document.getElementById('status-global');
        const statusDot = document.getElementById('status-dot');

        window.showToast = (msg, isError = false) => {
            const existing = document.getElementById('custom-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.className = `fixed bottom-6 right-6 px-4 py-3 rounded-lg shadow-2xl font-bold text-xs text-white z-[9999] transition-all transform animate-bounce ${isError ? 'bg-red-500' : 'bg-slate-800'}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // Lógica do Menu de Configurações e Fontes
        window.toggleSettings = () => {
            const panel = document.getElementById('settings-panel');
            panel.classList.toggle('hidden');
        };

        window.applyFont = (fontClass) => {
            document.body.classList.remove('font-sans', 'font-inter', 'font-poppins', 'font-roboto', 'font-montserrat');
            document.body.classList.add(fontClass);
            document.getElementById('font-selector').value = fontClass;
        };

        window.applyTheme = (themeClass) => {
            // Remove todas as classes de temas possíveis
            ALL_THEMES.forEach(t => {
                document.body.classList.remove(...t.split(' '));
            });
            // Adiciona a classe do novo tema (separando por espaços se for gradient)
            document.body.classList.add(...themeClass.split(' '));
            document.getElementById('theme-selector').value = themeClass;
        };

        window.changeFont = (fontClass) => {
            window.appFont = fontClass;
            window.applyFont(fontClass);
            window.persistAll(); 
            window.showToast("Fonte da aplicação atualizada!");
        };

        window.changeTheme = (themeClass) => {
            window.appTheme = themeClass;
            window.applyTheme(themeClass);
            window.persistAll();
            window.showToast("Tema de fundo atualizado!");
        };

        window.changeBtnFont = (fontClass) => {
            window.btnFont = fontClass;
            window.persistAll();
            renderAllBricks();
            window.updateStaticButtons();
            window.showToast("Fonte dos botões atualizada!");
        };

        window.changeBtnShape = (shapeClass) => {
            window.btnShape = shapeClass;
            window.persistAll();
            renderAllBricks();
            window.updateStaticButtons();
            window.showToast("Formato dos botões atualizado!");
        };

        window.changeBtnTextSize = (sizeClass) => {
            window.btnTextSize = sizeClass;
            window.persistAll();
            renderAllBricks();
            window.updateStaticButtons();
            window.showToast("Tamanho do texto atualizado!");
        };

        window.updateStaticButtons = () => {
            const quickBtnCopy = document.getElementById('btn-quick-copy');
            const quickBtnWa = document.getElementById('btn-quick-whatsapp');
            const staticBtns = [quickBtnCopy, quickBtnWa];
            
            staticBtns.forEach(btn => {
                if (btn) {
                    btn.classList.remove('font-sans', 'font-inter', 'font-poppins', 'font-roboto', 'font-montserrat');
                    btn.classList.add(window.btnFont);
                    
                    btn.classList.remove('rounded-xl', 'rounded-lg', 'rounded-full', 'rounded-sm');
                    btn.classList.add(window.btnShape);
                    
                    btn.classList.remove('text-[9px]', 'text-[10px]', 'text-xs', 'text-sm', 'text-base', 'text-lg');
                    btn.classList.add(window.btnTextSize);
                }
            });
        };

        // Copiar o texto da mensagem do bloco
        window.copyMessageText = (id) => {
            const msg = window.templates[id].msg;
            if (!msg) {
                window.showToast("A mensagem está vazia!", true);
                return;
            }
            const textArea = document.createElement("textarea");
            textArea.value = msg;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            window.showToast("Texto da mensagem copiado!");
        };

        // Função Global para sincronizar números em TODOS os 12 blocos
        window.syncAllPhones = (newDdd, newNum) => {
            Object.keys(window.templates).forEach(i => {
                window.templates[i].ddd = newDdd;
                window.templates[i].num = newNum;
                let dddEl = document.getElementById(`ddd-${i}`);
                let numEl = document.getElementById(`num-${i}`);
                if (dddEl) dddEl.value = newDdd;
                if (numEl) numEl.value = newNum;
            });
            window.persistAll();
        };

        // ========================================================
        // INTELIGÊNCIA: Limpeza e Formatação de Telefone (Blocos)
        // ========================================================
        window.handleDddInput = (id) => {
            let val = document.getElementById(`ddd-${id}`).value;
            // Clonar o novo DDD em todos os campos
            window.syncAllPhones(val, window.templates[id].num);
        };

        window.handlePhoneInput = (id) => {
            let numEl = document.getElementById(`num-${id}`);
            let val = numEl.value;
            
            if(val === "A ler imagem com IA...") return;

            let digits = val.replace(/\D/g, ''); 

            if (digits.startsWith('55') && (digits.length === 12 || digits.length === 13)) {
                digits = digits.substring(2);
            }

            let finalDdd = window.templates[id].ddd;
            let finalNum = digits;

            if (digits.length >= 10) {
                finalDdd = digits.substring(0, 2);
                let newNum = digits.substring(2);

                if (newNum.length === 8) {
                    finalNum = '9' + newNum; 
                } else if (newNum.length > 9) {
                    finalNum = newNum.substring(0, 9);
                } else {
                    finalNum = newNum;
                }
            }
            
            // Clona automaticamente para os 12 blocos!
            window.syncAllPhones(finalDdd, finalNum);
        };

        window.handlePhoneBlur = (id) => {
            let numEl = document.getElementById(`num-${id}`);
            let digits = numEl.value.replace(/\D/g, '');
            
            let finalDdd = window.templates[id].ddd;
            let finalNum = digits;

            if (digits.length === 8) {
                finalNum = '9' + digits;
                window.syncAllPhones(finalDdd, finalNum);
            }
        };

        // OCR PARA OS BLOCOS (Tijolos)
        window.handlePhonePaste = async (e, id) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            
            for (let index in items) {
                const item = items[index];
                
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    e.preventDefault(); 
                    const blob = item.getAsFile();
                    
                    let numEl = document.getElementById(`num-${id}`);
                    const originalValue = numEl.value;
                    numEl.value = "A ler imagem com IA...";
                    
                    try {
                        const { data: { text } } = await Tesseract.recognize(blob, 'por');
                        
                        const phoneRegex = /(?:\+?55\s*)?(?:\(?\d{2}\)?\s*)?\d{4,5}[-\s]*\d{4}/g;
                        const match = text.match(phoneRegex);
                        
                        if (match) {
                            numEl.value = match[0];
                            window.handlePhoneInput(id);
                            window.handlePhoneBlur(id);
                            window.showToast("Número extraído e clonado com sucesso!");
                        } else {
                            let digits = text.replace(/\D/g, '');
                            if (digits.startsWith('55') && digits.length >= 12) digits = digits.substring(2);
                            
                            if (digits.length >= 8 && digits.length <= 11) {
                                numEl.value = digits;
                                window.handlePhoneInput(id);
                                window.handlePhoneBlur(id);
                                window.showToast("Número extraído e clonado com sucesso!");
                            } else {
                                numEl.value = originalValue;
                                window.showToast("Nenhum número claro encontrado.", true);
                            }
                        }
                    } catch (err) {
                        console.error("Erro OCR:", err);
                        numEl.value = originalValue;
                        window.showToast("Erro ao ler a imagem.", true);
                    }
                    return; 
                }
            }
        };

        // ========================================================
        // INTELIGÊNCIA: Gerador Rápido c/ Leitura de Imagens (OCR)
        // ========================================================
        const quickNumberInput = document.getElementById('quick-number');
        const quickLinkOutput = document.getElementById('quick-link');

        const processQuickNumber = (e) => {
            let val = e.target.value;
            
            if(val === "A ler imagem com IA...") return;

            let digits = val.replace(/\D/g, ''); 
            
            if (digits.startsWith('55') && (digits.length === 12 || digits.length === 13)) {
                digits = digits.substring(2);
            }
            
            if (digits.length >= 10) {
                let ddd = digits.substring(0, 2);
                let num = digits.substring(2);
                if (num.length === 8) {
                    num = '9' + num;
                } else if (num.length > 9) {
                    num = num.substring(0, 9);
                }
                digits = ddd + num;
            }
            
            e.target.value = digits;
            if (digits.length > 0) {
                quickLinkOutput.value = `https://wa.me/55${digits}`;
            } else {
                quickLinkOutput.value = '';
            }
        };

        quickNumberInput.addEventListener('input', processQuickNumber);
        quickNumberInput.addEventListener('blur', processQuickNumber);

        quickNumberInput.addEventListener('paste', async (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            
            for (let index in items) {
                const item = items[index];
                
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    e.preventDefault(); 
                    const blob = item.getAsFile();
                    
                    quickNumberInput.value = "A ler imagem com IA...";
                    quickLinkOutput.value = "";
                    
                    try {
                        const { data: { text } } = await Tesseract.recognize(blob, 'por');
                        
                        const phoneRegex = /(?:\+?55\s*)?(?:\(?\d{2}\)?\s*)?\d{4,5}[-\s]*\d{4}/g;
                        const match = text.match(phoneRegex);
                        
                        if (match) {
                            quickNumberInput.value = match[0];
                            processQuickNumber({ target: quickNumberInput });
                            window.showToast("Número extraído com sucesso!");
                        } else {
                            let digits = text.replace(/\D/g, '');
                            if (digits.startsWith('55') && digits.length >= 12) digits = digits.substring(2);
                            
                            if (digits.length >= 8 && digits.length <= 11) {
                                quickNumberInput.value = digits;
                                processQuickNumber({ target: quickNumberInput });
                                window.showToast("Número extraído com sucesso!");
                            } else {
                                quickNumberInput.value = "";
                                window.showToast("Nenhum número de telefone claro encontrado.", true);
                            }
                        }
                    } catch (err) {
                        console.error("Erro OCR:", err);
                        quickNumberInput.value = "";
                        window.showToast("Erro ao ler a imagem.", true);
                    }
                    return; 
                }
            }
        });

        // Ação: WhatsApp Direto no Gerador Rápido
        window.openQuickWhatsApp = () => {
            const link = quickLinkOutput.value;
            if (!link) {
                window.showToast("Insira um número primeiro!", true);
                return;
            }
            const phone = link.split('wa.me/')[1];
            if (phone) {
                window.open(`whatsapp://send?phone=${phone}`, '_self');
            }
        };

        // Ação: Copiar Link no Gerador Rápido
        window.copyQuickLink = () => {
            const link = quickLinkOutput.value;
            if (!link) {
                window.showToast("Insira um número primeiro!", true);
                return;
            }

            const textArea = document.createElement("textarea");
            textArea.value = link;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);

            const btn = document.getElementById('btn-quick-copy');
            const originalText = btn.innerText;
            btn.innerText = "COPIADO!";
            btn.classList.add('bg-green-500');
            btn.classList.remove('bg-sky-500', 'hover:bg-sky-600');
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('bg-green-500');
                btn.classList.add('bg-sky-500', 'hover:bg-sky-600');
            }, 2000);
            
            window.showToast("Link rápido copiado!");
        };

        // ========================================================
        // INICIALIZAÇÃO FIREBASE E APP
        // ========================================================
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Erro na autenticação:", error);
                statusText.innerText = "Erro Auth";
                statusDot.className = "w-2 h-2 rounded-full bg-red-500";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                setupDataListener();
            }
        });

        const setupDataListener = () => {
            if (!currentUser) return;
            const docRef = doc(db, 'artifacts', appIdentifier, 'users', currentUser.uid, 'settings', 'stack');
            
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Mergir templates com a garantia de termos os 12
                    let loadedTemplates = data.templates || {};
                    for(let i = 1; i <= 12; i++) {
                        if(!loadedTemplates[i]) {
                            loadedTemplates[i] = { title: `Modelo ${i}`, msg: "", num: "", ddd: "33" };
                        }
                    }
                    window.templates = loadedTemplates;

                    window.appFont = data.font || 'font-sans';
                    window.btnFont = data.btnFont || 'font-sans';
                    window.btnShape = data.btnShape || 'rounded-lg';
                    window.btnTextSize = data.btnTextSize || 'text-[10px]';
                    
                    // Default para um tema que usa as novas cores gradientes
                    window.appTheme = data.appTheme || 'bg-gradient-to-br from-slate-100 via-white to-slate-100';
                    
                    window.applyFont(window.appFont);
                    window.applyTheme(window.appTheme);
                    document.getElementById('btn-font-selector').value = window.btnFont;
                    document.getElementById('btn-shape-selector').value = window.btnShape;
                    document.getElementById('btn-size-selector').value = window.btnTextSize;
                    
                    // Verifica se o tema atual salvo está na lista dos novos, caso contrário aplica o padrão novo
                    if (!ALL_THEMES.includes(window.appTheme)) {
                        window.changeTheme('bg-gradient-to-br from-slate-100 via-white to-slate-100');
                    } else {
                        document.getElementById('theme-selector').value = window.appTheme;
                    }
                    
                    window.updateStaticButtons();
                    
                    if (isFirstLoad) {
                        renderAllBricks();
                        isFirstLoad = false;
                    }
                } else if (isFirstLoad) {
                    renderAllBricks();
                    isFirstLoad = false;
                }
                
                statusText.innerText = "Sincronizado";
                statusDot.className = "w-1.5 h-1.5 rounded-full bg-green-500";
            }, (err) => { 
                console.error(err);
                statusText.innerText = "Erro Firestore"; 
                statusDot.className = "w-1.5 h-1.5 rounded-full bg-red-500";
            });
        };

        let saveTimeout;
        window.persistAll = () => {
            if (!currentUser) return;
            statusText.innerText = "A guardar...";
            statusDot.className = "w-1.5 h-1.5 rounded-full bg-yellow-400 animate-pulse";
            
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                const docRef = doc(db, 'artifacts', appIdentifier, 'users', currentUser.uid, 'settings', 'stack');
                try {
                    await setDoc(docRef, { 
                        templates: window.templates, 
                        font: window.appFont,
                        btnFont: window.btnFont,
                        btnShape: window.btnShape,
                        btnTextSize: window.btnTextSize,
                        appTheme: window.appTheme,
                        lastUpdated: new Date() 
                    }, { merge: true });
                    statusText.innerText = "Sincronizado";
                    statusDot.className = "w-1.5 h-1.5 rounded-full bg-green-500";
                } catch (e) { 
                    console.error(e); 
                    statusText.innerText = "Erro ao guardar";
                    statusDot.className = "w-1.5 h-1.5 rounded-full bg-red-500";
                }
            }, 800);
        };

        window.disparar = (id, type) => {
            const data = window.templates[id];
            let cleanNum = data.num ? String(data.num).replace(/\D/g, '') : '';
            
            if (cleanNum.length === 8) {
                cleanNum = '9' + cleanNum;
            }
            
            const msgEncoded = encodeURIComponent(data.msg || '');
            
            if (!cleanNum) {
                window.showToast("Insira o número no Bloco " + id, true);
                return;
            }

            if (type === 'app') {
                const link = `whatsapp://send?phone=55${data.ddd}${cleanNum}&text=${msgEncoded}`;
                window.open(link, '_self'); 
            } else {
                const link = `https://web.whatsapp.com/send?phone=55${data.ddd}${cleanNum}&text=${msgEncoded}`;
                window.open(link, '_blank');
            }
        };

        window.copiar = (id) => {
            const data = window.templates[id];
            let cleanNum = data.num ? String(data.num).replace(/\D/g, '') : '';
            
            if (cleanNum.length === 8) {
                cleanNum = '9' + cleanNum;
            }
            
            const msgEncoded = encodeURIComponent(data.msg || '');
            const link = `https://wa.me/55${data.ddd}${cleanNum}?text=${msgEncoded}`;
            
            const textArea = document.createElement("textarea");
            textArea.value = link;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);

            const btn = document.getElementById(`btn-copy-${id}`);
            const originalText = btn.innerText;
            btn.innerText = "COPIADO!";
            btn.classList.add('text-sky-600', 'border-sky-400');
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('text-sky-600', 'border-sky-400');
            }, 2000);
            
            window.showToast("Link copiado com sucesso!");
        };

        // Geração dinâmica de cores exclusivas para cada bloco (Vivas e de Alto Contraste)
        window.getBadgeColor = (id) => {
            const colors = [
                'bg-slate-500 text-white border-slate-600', // 0 (fallback)
                'bg-red-500 text-white border-red-600',       // 1
                'bg-blue-500 text-white border-blue-600',     // 2
                'bg-amber-500 text-white border-amber-600',   // 3
                'bg-purple-500 text-white border-purple-600', // 4
                'bg-emerald-500 text-white border-emerald-600',// 5
                'bg-pink-500 text-white border-pink-600',     // 6
                'bg-cyan-500 text-white border-cyan-600',     // 7
                'bg-orange-500 text-white border-orange-600', // 8
                'bg-indigo-500 text-white border-indigo-600', // 9
                'bg-lime-500 text-white border-lime-600',     // 10
                'bg-rose-500 text-white border-rose-600',     // 11
                'bg-sky-500 text-white border-sky-600'        // 12
            ];
            return colors[id] || colors[0];
        };

        const renderAllBricks = () => {
            const container = document.getElementById('bricks-container');
            container.innerHTML = '';
            Object.keys(window.templates).forEach(id => {
                const badgeColorClass = window.getBadgeColor(id);
                const brick = document.createElement('div');
                brick.className = "bg-white rounded-xl shadow-sm border border-gray-100 p-4 transition-all hover:shadow-md flex flex-col h-full";
                brick.innerHTML = `
                    <!-- Cabeçalho do Bloco -->
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-3 flex-1">
                            <span class="${badgeColorClass} w-10 h-10 border flex items-center justify-center rounded-md font-black text-xl shrink-0 shadow-sm transition-all">${id}</span>
                            <input type="text" value="${window.templates[id].title}" 
                                oninput="window.templates[${id}].title = this.value; persistAll()"
                                class="text-sm font-bold text-gray-700 bg-transparent border-b border-transparent hover:border-gray-200 focus:border-green-500 outline-none w-full py-0.5 transition-colors"
                                placeholder="Nome do Modelo ${id}">
                        </div>
                        <button onclick="copyMessageText(${id})" class="ml-2 p-1.5 text-slate-400 hover:text-sky-500 hover:bg-sky-50 rounded transition-colors shrink-0" title="Copiar Texto da Mensagem">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 00-2-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        </button>
                    </div>

                    <!-- Caixa de Texto -->
                    <textarea id="textarea-${id}"
                        oninput="window.templates[${id}].msg = this.value; persistAll()"
                        class="w-full h-48 p-3 bg-slate-50 border border-gray-100 rounded-lg focus:ring-2 focus:ring-green-400 outline-none text-gray-700 text-xs sm:text-sm leading-relaxed resize-none transition-colors mb-3"
                        placeholder="Cole o texto aqui...">${window.templates[id].msg}</textarea>
                    
                    <!-- Controlos (Empurrados para o fundo) -->
                    <div class="mt-auto space-y-2 pt-2 border-t border-slate-50">
                        <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest block flex items-center justify-between mb-1">
                            <span>WhatsApp</span>
                            <span class="text-[7px] bg-sky-100 text-sky-600 px-1.5 py-0.5 rounded-full flex items-center gap-1">
                                <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                Lê Prints!
                            </span>
                        </label>
                        <div class="flex gap-2">
                            <input type="number" id="ddd-${id}" value="${window.templates[id].ddd}" 
                                oninput="window.handleDddInput(${id})"
                                class="w-12 p-2 bg-slate-50 border border-gray-100 rounded-lg text-center font-bold text-gray-600 text-sm focus:ring-2 focus:ring-green-400 outline-none transition-colors">
                            <input type="text" id="num-${id}" value="${window.templates[id].num}" 
                                oninput="window.handlePhoneInput(${id})"
                                onblur="window.handlePhoneBlur(${id})"
                                onpaste="window.handlePhonePaste(event, ${id})"
                                class="flex-1 p-2 bg-slate-50 border border-gray-100 rounded-lg font-mono text-sm focus:ring-2 focus:ring-green-400 outline-none transition-colors placeholder:text-slate-300" 
                                placeholder="Digite ou Cole">
                        </div>
                        <div class="flex gap-2 pt-1">
                            <button onclick="disparar(${id}, 'app')" 
                                class="flex-1 bg-[#25D366] hover:bg-[#128C7E] text-white font-black py-2.5 ${window.btnShape} ${window.btnFont} shadow-sm transition-all active:scale-95 flex items-center justify-center gap-1.5 uppercase ${window.btnTextSize} tracking-widest leading-none">
                                Abrir App
                            </button>
                            <button id="btn-copy-${id}" onclick="copiar(${id})" 
                                class="flex-1 border-2 border-slate-200 hover:border-sky-400 hover:text-sky-600 text-slate-400 font-black py-2 ${window.btnShape} ${window.btnFont} transition-all active:scale-95 uppercase ${window.btnTextSize} tracking-widest leading-none">
                                Copiar Link
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(brick);
            });
        };

        window.updateStaticButtons();
        renderAllBricks();
        initAuth();
    </script>
</body>
</html>
