<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DisparoFive - Produção</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ========================================================
        // 1. COLA O TEU CONFIG DO FIREBASE AQUI:
        // ========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDxZcyaKlxkSSptdRTN8HRyO3P58wbd0jk",
            authDomain: "disparofire-cfbfb.firebaseapp.com",
            projectId: "disparofire-cfbfb",
            storageBucket: "disparofire-cfbfb.firebasestorage.app",
            messagingSenderId: "194928300801",
            appId: "1:194928300801:web:906db6180611ab71364100"
        };
        // ========================================================

        const appIdentifier = 'disparofive-prod'; // ID para organizar os dados no Firestore
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        
        // Colocamos os templates no window para o HTML ter acesso direto aos dados
        window.templates = {
            1: { title: "Modelo 1", msg: "", num: "", ddd: "33" },
            2: { title: "Modelo 2", msg: "", num: "", ddd: "33" },
            3: { title: "Modelo 3", msg: "", num: "", ddd: "33" },
            4: { title: "Modelo 4", msg: "", num: "", ddd: "33" },
            5: { title: "Modelo 5", msg: "", num: "", ddd: "33" }
        };

        const statusText = document.getElementById('status-global');
        const loadingOverlay = document.getElementById('loading-overlay');

        // Substituição do Alert padrão do navegador por um Toast moderno
        window.showToast = (msg, isError = false) => {
            const existing = document.getElementById('custom-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.className = `fixed bottom-6 right-6 px-6 py-4 rounded-xl shadow-2xl font-bold text-sm text-white z-50 transition-all transform animate-bounce ${isError ? 'bg-red-500' : 'bg-slate-800'}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Erro na autenticação:", error);
                statusText.innerText = "Erro Auth";
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                setupDataListener();
            }
        });

        const setupDataListener = () => {
            if (!currentUser) return;
            // Path: /artifacts/appId/users/userId/settings/stack
            const docRef = doc(db, 'artifacts', appIdentifier, 'users', currentUser.uid, 'settings', 'stack');
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    window.templates = docSnap.data().templates || window.templates;
                    
                    // Impede que a página recarregue os campos enquanto estás a digitar (perda de foco)
                    if (!docSnap.metadata.hasPendingWrites) {
                        renderAllBricks();
                    }
                }
                statusText.innerText = "Nuvem: Ativa";
                loadingOverlay.classList.add('hidden');
            }, (err) => { 
                console.error(err);
                statusText.innerText = "Erro Firestore"; 
                loadingOverlay.classList.add('hidden');
            });
        };

        let saveTimeout;
        window.persistAll = () => {
            if (!currentUser) return;
            statusText.innerText = "A guardar...";
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                const docRef = doc(db, 'artifacts', appIdentifier, 'users', currentUser.uid, 'settings', 'stack');
                try {
                    await setDoc(docRef, { templates: window.templates, lastUpdated: new Date() }, { merge: true });
                    statusText.innerText = "Sincronizado";
                } catch (e) { console.error(e); }
            }, 800);
        };

        window.disparar = (id, type) => {
            const data = window.templates[id];
            // Prevenção de erros caso data.num seja indefinido
            const cleanNum = data.num ? String(data.num).replace(/\D/g, '') : '';
            const msgEncoded = encodeURIComponent(data.msg || '');
            
            if (!cleanNum) {
                window.showToast("Insira o número no Bloco " + id, true);
                return;
            }

            const baseUrl = (type === 'web') ? "https://web.whatsapp.com/send" : "https://wa.me";
            const link = `${baseUrl}?phone=55${data.ddd}${cleanNum}&text=${msgEncoded}`;
            window.open(link, '_blank');
        };

        window.copiar = (id) => {
            const data = window.templates[id];
            const cleanNum = data.num ? String(data.num).replace(/\D/g, '') : '';
            const msgEncoded = encodeURIComponent(data.msg || '');
            const link = `https://wa.me/55${data.ddd}${cleanNum}?text=${msgEncoded}`;
            
            const textArea = document.createElement("textarea");
            textArea.value = link;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);

            const btn = document.getElementById(`btn-copy-${id}`);
            const originalText = btn.innerText;
            btn.innerText = "LINK COPIADO!";
            btn.classList.add('text-sky-600', 'border-sky-400');
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('text-sky-600', 'border-sky-400');
            }, 2000);
            
            window.showToast("Link copiado com sucesso!");
        };

        const renderAllBricks = () => {
            const container = document.getElementById('bricks-container');
            container.innerHTML = '';
            Object.keys(window.templates).forEach(id => {
                const brick = document.createElement('div');
                brick.className = "bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6 transition-all hover:shadow-md";
                brick.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                        <div class="lg:col-span-7 space-y-3">
                            <div class="flex items-center gap-3">
                                <span class="bg-slate-100 text-slate-500 w-7 h-7 flex items-center justify-center rounded-lg font-black text-[10px]">${id}</span>
                                <input type="text" value="${window.templates[id].title}" 
                                    oninput="window.templates[${id}].title = this.value; persistAll()"
                                    class="text-sm font-bold text-gray-700 bg-transparent border-b border-transparent hover:border-gray-200 focus:border-green-500 outline-none w-full py-1"
                                    placeholder="Nome do Modelo ${id}">
                            </div>
                            <textarea id="textarea-${id}"
                                oninput="window.templates[${id}].msg = this.value; persistAll()"
                                class="w-full h-64 p-4 bg-slate-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-green-400 outline-none text-gray-700 text-sm leading-relaxed resize-none font-sans"
                                placeholder="Cole o texto aqui...">${window.templates[id].msg}</textarea>
                        </div>
                        <div class="lg:col-span-5 flex flex-col h-full justify-between pt-10">
                            <div class="space-y-4">
                                <div class="space-y-2">
                                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block">Número do WhatsApp</label>
                                    <div class="flex gap-2">
                                        <input type="number" value="${window.templates[id].ddd}" 
                                            oninput="window.templates[${id}].ddd = this.value; persistAll()"
                                            class="w-16 p-3 bg-slate-50 border border-gray-100 rounded-xl text-center font-bold text-gray-600 focus:ring-2 focus:ring-green-400 outline-none">
                                        <input type="text" value="${window.templates[id].num}" 
                                            oninput="window.templates[${id}].num = this.value; persistAll()"
                                            class="flex-1 p-3 bg-slate-50 border border-gray-100 rounded-xl font-mono text-lg focus:ring-2 focus:ring-green-400 outline-none" 
                                            placeholder="99999-9999">
                                    </div>
                                </div>
